services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: ${GLUETUN_CONTAINER_NAME}
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=mullvad
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${MULLVAD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${MULLVAD_ADDRESS}
      - SERVER_COUNTRIES=${MULLVAD_SERVER_COUNTRY}
    ports:
      - "8081:8081"    # metube
#      - "8080:8080"    # qbittorrent
    volumes:
      - /opt/mediastack/config/gluetun:/gluetun
    restart: unless-stopped

  metube:
    image: ghcr.io/alexta69/metube
    container_name: metube
    network_mode: "service:gluetun"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - "8081:8081"
    volumes:
      - /opt/mediastack/downloads:/downloads
    depends_on:
      - gluetun
    restart: unless-stopped

