# =============================================================================
# mediastack/docker-compose.yml
# Services: Immich, Jellyfin
# *ARR suite: uncomment when ready
# =============================================================================

networks:
  mediastack:
    driver: bridge

# =============================================================================
# IMMICH
# https://immich.app/docs/install/docker-compose
# =============================================================================
services:

  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    restart: unless-stopped
    ports:
      - "${IMMICH_PORT:-2283}:2283"
    volumes:
      - ${IMMICH_UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_HOSTNAME: ${DB_HOSTNAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME}
      REDIS_HOSTNAME: ${REDIS_HOSTNAME}
    depends_on:
      - redis
      - database
    networks:
      - mediastack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2283/api/server-info/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    restart: unless-stopped
    volumes:
      - ${IMMICH_DATA}/model-cache:/cache
    networks:
      - mediastack

  redis:
    container_name: immich_redis
    image: redis:6.2-alpine
    restart: unless-stopped
    networks:
      - mediastack
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    container_name: immich_postgres
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
    volumes:
      - ${IMMICH_DB_DATA}:/var/lib/postgresql/data
    networks:
      - mediastack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_DATABASE_NAME} -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# JELLYFIN
# https://jellyfin.org/docs/general/installation/container
# =============================================================================

  jellyfin:
    container_name: jellyfin
    image: jellyfin/jellyfin:latest
    restart: unless-stopped
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
      - "${JELLYFIN_HTTPS_PORT:-8920}:8920"   # optional HTTPS
    volumes:
      - ${JELLYFIN_CONFIG}:/config
      - ${JELLYFIN_CACHE}:/cache
      # Media is mounted read-only — Jellyfin should not write to your library
      - ${MEDIA_MOVIES}:/media/movies:ro
      - ${MEDIA_TVSHOWS}:/media/tvshows:ro
      - ${MEDIA_MUSIC}:/media/music:ro
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
    networks:
      - mediastack

    # runtime: nvidia
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

